<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#28a745;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:20px auto;
}

.dashboard{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.card{
    background:white;
    width:250px;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    color:#28a745;
    margin-bottom:10px;
}

.value{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
}

.workout-section{
    margin-top:30px;
}

.workout-section h2{
    text-align:center;
    margin-bottom:20px;
}

.workout-container{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.workout-card{
    width:280px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.workout-card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.workout-content{
    padding:15px;
    text-align:center;
}

.workout-content button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

.workout-content button:hover{
    background:#1e7e34;
}
</style>

</head>
<body>

<header>
    <h1>💪 Fitness Tracker</h1>
    <p>Track Your Health & Workouts</p>
</header>

<div class="container">

    <div class="dashboard">

        <div class="card">
            <h2>👣 Steps</h2>
            <div class="value">8,450</div>
        </div>

        <div class="card">
            <h2>🔥 Calories</h2>
            <div class="value">1,250</div>
        </div>

        <div class="card">
            <h2>⏱ Workout Time</h2>
            <div class="value">75 Min</div>
        </div>

        <div class="card">
            <h2>💧 Water Intake</h2>
            <div class="value">2.5 L</div>
        </div>

    </div>

    <div class="workout-section">
        <h2>Today's Workouts</h2>

        <div class="workout-container">

            <div class="workout-card">
                <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=500" alt="Running">
                <div class="workout-content">
                    <h3>Running</h3>
                    <p>30 Minutes Cardio Session</p>
                    <button>Start Workout</button>
                </div>
            </div>

            <div class="workout-card">
                <img src="https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=500" alt="Gym">
                <div class="workout-content">
                    <h3>Gym Training</h3>
                    <p>Strength & Muscle Building</p>
                    <button>Start Workout</button>
                </div>
            </div>

            <div class="workout-card">
                <img src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=500" alt="Yoga">
                <div class="workout-content">
                    <h3>Yoga</h3>
                    <p>Flexibility & Relaxation</p>
                    <button>Start Workout</button>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
