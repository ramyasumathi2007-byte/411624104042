<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#ff5722;
    color:white;
    text-align:center;
    padding:20px;
}

.search-box{
    text-align:center;
    margin:20px;
}

.search-box input{
    width:300px;
    max-width:80%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.search-box button{
    padding:10px 20px;
    border:none;
    background:#ff5722;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.search-box button:hover{
    background:#e64a19;
}

.food-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.food-card{
    width:250px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    transition:0.3s;
}

.food-card:hover{
    transform:translateY(-5px);
}

.food-card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.food-card-content{
    padding:15px;
    text-align:center;
}

.food-card h3{
    margin-bottom:10px;
}

.price{
    color:green;
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.food-card button{
    padding:10px 20px;
    border:none;
    background:#ff5722;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.food-card button:hover{
    background:#e64a19;
}
</style>

</head>
<body>

<header>
    <h1>🍔 Foodie Express</h1>
    <p>Delicious Food Delivered Fast</p>
</header>

<div class="search-box">
    <input type="text" placeholder="Search your favorite food">
    <button>Search</button>
</div>

<div class="food-container">

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" alt="Pizza">
        <div class="food-card-content">
            <h3>Pizza</h3>
            <p class="price">₹299</p>
            <button>Order Now</button>
        </div>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" alt="Burger">
        <div class="food-card-content">
            <h3>Burger</h3>
            <p class="price">₹149</p>
            <button>Order Now</button>
        </div>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a?w=500" alt="Biryani">
        <div class="food-card-content">
            <h3>Biryani</h3>
            <p class="price">₹249</p>
            <button>Order Now</button>
        </div>
    </div>

    <div class="food-card">
       <img src="https://images.unsplash.com/photo-1668236543090-82eba5ee5976?w=500" alt="Dosa">
        <div class="food-card-content">
            <h3>Dosa</h3>
            <p class="price">₹99</p>
            <button>Order Now</button>
        </div>
    </div>

</div>

</body>
</html>
